spring:
  application:
    name: eqh
  
  # DB 연결 정보 추가
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:testdb
    username: sa
    password:

  # H2 콘솔 사용 설정 (웹에서 DB 확인용)
  h2:
    console:
      enabled: true

  # JPA/Hibernate 설정
  jpa:
    hibernate:
      ddl-auto: update # 테이블 자동 생성
    show-sql: true     # 실행되는 SQL 로그 출력
    properties:
      hibernate:
        format_sql: true

# JWT는 spring 바깥에 (이전 단계에서 수정한 대로)
jwt:
  secret: YOUR_BASE64_ENCODED_256BIT_OR_LONGER_SECRET_KEY_HERE